name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            cross: true
          - os: ubuntu-latest
            target: aarch64-linux
            cross: true
          - os: macos-latest
            target: aarch64-macos
            cross: false
          - os: macos-13
            target: x86_64-macos
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0-dev.2905+5d71e3051
    - name: Build
      run: |
        if [ "${{ matrix.cross }}" = "true" ]; then
          zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
        else
          zig build -Doptimize=ReleaseSafe
        fi
    - name: Package
      run: tar -czf pidgn-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C zig-out/bin pidgn
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pidgn-cli-${{ matrix.target }}
        path: pidgn-cli-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        pattern: pidgn-cli-*
        merge-multiple: true
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: pidgn-cli-*.tar.gz
