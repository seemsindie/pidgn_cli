services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      HOST: "0.0.0.0"
      PORT: "4000"
      DATABASE_URL: "postgres://pidgn:pidgn@postgres:5432/$NAME$"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: $NAME$
      POSTGRES_USER: pidgn
      POSTGRES_PASSWORD: pidgn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
